name: Build Nginx for ARM64

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'Nginx 版本号 (留空则自动获取最新稳定版)'
        required: false
        default: ''
        type: string

jobs:
  build-nginx-arm64:
    name: Build Nginx for ARM64
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: 获取最新稳定版版本号
        id: get_version
        run: |
          if [ -n "${{ inputs.nginx_version }}" ]; then
            NGINX_VERSION="${{ inputs.nginx_version }}"
            echo "使用手动输入的版本: ${NGINX_VERSION}"
          else
            echo "正在获取 Nginx 最新稳定版本号..."
            NGINX_VERSION=$(curl -s https://nginx.org/en/download.html | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -z "$NGINX_VERSION" ]; then
              echo "错误: 无法从官网获取版本号，请手动输入"
              exit 1
            fi
            echo "获取到最新稳定版本: ${NGINX_VERSION}"
          fi
          echo "nginx_version=${NGINX_VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          
      - name: 使用 Docker 编译 Nginx
        run: |
          # 创建一个 Dockerfile 用于编译
          cat > Dockerfile << 'EOF'
          FROM ubuntu:24.04
          
          ENV DEBIAN_FRONTEND=noninteractive
          ENV NGINX_VERSION=${NGINX_VERSION}
          
          RUN apt-get update && apt-get install -y \
              build-essential \
              gcc \
              g++ \
              make \
              libpcre3 \
              libpcre3-dev \
              libssl-dev \
              zlib1g-dev \
              wget \
              tar \
              curl \
              && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /tmp
          
          # 下载并编译 Nginx
          RUN wget https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz && \
              tar -xzf nginx-${NGINX_VERSION}.tar.gz && \
              cd nginx-${NGINX_VERSION} && \
              ./configure \
                --prefix=/usr/local/nginx \
                --sbin-path=/usr/local/sbin/nginx \
                --conf-path=/etc/nginx/nginx.conf \
                --error-log-path=/var/log/nginx/error.log \
                --http-log-path=/var/log/nginx/access.log \
                --pid-path=/var/run/nginx.pid \
                --lock-path=/var/lock/nginx.lock \
                --user=www-data \
                --group=www-data \
                --with-http_ssl_module \
                --with-http_v2_module \
                --with-http_gzip_static_module \
                --with-http_stub_status_module \
                --with-threads \
                --with-cc-opt='-O2 -g -pipe -Wall -Wp,-D_FORTIFY_SOURCE=2 -fexceptions -fstack-protector-strong --param=ssp-buffer-size=4' && \
              make -j$(nproc) && \
              make install DESTDIR=/tmp/nginx-install
          EOF
          
          # 构建 Docker 镜像
          docker build --build-arg NGINX_VERSION=${{ steps.get_version.outputs.nginx_version }} -t nginx-builder .
          
          # 从容器中复制编译产物
          docker create --name nginx-builder-container nginx-builder
          docker cp nginx-builder-container:/tmp/nginx-install ./nginx-install
          docker rm nginx-builder-container
          
      - name: 创建发布包
        run: |
          mkdir -p /tmp/nginx-package/usr/local/sbin
          mkdir -p /tmp/nginx-package/usr/local/nginx
          mkdir -p /tmp/nginx-package/etc/nginx
          mkdir -p /tmp/nginx-package/var/log/nginx
          mkdir -p /tmp/nginx-package/var/run/nginx
          
          # 复制二进制文件
          cp ./nginx-install/usr/local/sbin/nginx /tmp/nginx-package/usr/local/sbin/
          
          # 复制配置文件
          cat > /tmp/nginx-package/etc/nginx/nginx.conf << 'EOF'
          user www-data;
          worker_processes auto;
          pid /var/run/nginx/nginx.pid;
          error_log /var/log/nginx/error.log;
          
          events {
              worker_connections 1024;
              use epoll;
          }
          
          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;
              
              access_log /var/log/nginx/access.log;
              
              sendfile on;
              tcp_nopush on;
              keepalive_timeout 65;
              gzip on;
              
              server {
                  listen 80;
                  server_name localhost;
                  
                  location / {
                      root /usr/local/nginx/html;
                      index index.html index.htm;
                  }
                  
                  error_page 500 502 503 504 /50x.html;
                  location = /50x.html {
                      root /usr/local/nginx/html;
                  }
              }
          }
          EOF
          
          # 创建默认首页
          mkdir -p /tmp/nginx-package/usr/local/nginx/html
          cat > /tmp/nginx-package/usr/local/nginx/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Nginx on ARM64</title>
          </head>
          <body>
              <h1>Welcome to Nginx on ARM64!</h1>
              <p>Built with GitHub Actions using Docker</p>
              <p>Version: ${{ steps.get_version.outputs.nginx_version }}</p>
          </body>
          </html>
          EOF
          
          # 复制 mime.types（如果存在）
          if [ -f ./nginx-install/usr/local/nginx/conf/mime.types ]; then
            cp ./nginx-install/usr/local/nginx/conf/mime.types /tmp/nginx-package/etc/nginx/
          else
            # 创建基本的 mime.types
            cat > /tmp/nginx-package/etc/nginx/mime.types << 'EOF'
            types {
                text/html                             html htm shtml;
                text/css                              css;
                text/xml                              xml;
                image/gif                             gif;
                image/jpeg                            jpeg jpg;
                application/javascript                js;
                application/atom+xml                  atom;
                application/rss+xml                   rss;
                text/mathml                           mml;
                text/plain                            txt;
                text/vnd.sun.j2me.app-descriptor      jad;
                text/vnd.wap.wml                      wml;
                text/x-component                      htc;
                image/png                             png;
                image/tiff                            tif tiff;
                image/vnd.wap.wbmp                    wbmp;
                image/webp                            webp;
                image/x-icon                          ico;
                image/x-jng                           jng;
                image/x-ms-bmp                        bmp;
                image/svg+xml                         svg svgz;
                image/x-jng                           jng;
                font/woff                             woff;
                font/woff2                            woff2;
                application/java-archive              jar war ear;
                application/json                      json;
                application/mac-binhex40              hqx;
                application/msword                    doc;
                application/pdf                       pdf;
                application/postscript                ps eps ai;
                application/rtf                       rtf;
                application/vnd.apple.mpegurl         m3u8;
                application/vnd.google-earth.kml+xml  kml;
                application/vnd.google-earth.kmz      kmz;
                application/vnd.ms-excel              xls;
                application/vnd.ms-fontobject         eot;
                application/vnd.ms-powerpoint         ppt;
                application/vnd.oasis.opendocument.chart odc;
                application/vnd.oasis.opendocument.database odb;
                application/vnd.oasis.opendocument.formula odf;
                application/vnd.oasis.opendocument.graphics odg;
                application/vnd.oasis.opendocument.presentation odp;
                application/vnd.oasis.opendocument.spreadsheet ods;
                application/vnd.oasis.opendocument.text odt;
                application/vnd.openxmlformats-officedocument.presentationml.presentation pptx;
                application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
                application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
                application/vnd.wap.wmlc               wmlc;
                application/x-7z-compressed            7z;
                application/x-cocoa                     cco;
                application/x-java-archive-diff        jardiff;
                application/x-java-jnlp-file           jnlp;
                application/x-makeself                 run;
                application/x-perl                      pl pm;
                application/x-pilot                     prc pdb;
                application/x-rar-compressed           rar;
                application/x-redhat-package-manager   rpm;
                application/x-sea                      sea;
                application/x-shockwave-flash          swf;
                application/x-stuffit                   sit;
                application/x-tcl                       tcl tk;
                application/x-x509-ca-cert              der pem crt;
                application/x-xpinstall                 xpi;
                application/xhtml+xml                   xhtml;
                application/xspf+xml                    xspf;
                application/zip                        zip;
                application/octet-stream                bin exe dll;
                application/octet-stream                deb;
                application/octet-stream                dmg;
                application/octet-stream                iso img;
                application/octet-stream                msi msp msm;
                audio/midi                              mid midi kar;
                audio/mpeg                              mp3;
                audio/ogg                               ogg;
                audio/x-m4a                             m4a;
                audio/x-realaudio                       ra;
                video/3gpp                              3gpp 3gp;
                video/mp2t                              ts;
                video/mp4                               mp4;
                video/mpeg                              mpeg mpg;
                video/quicktime                         mov;
                video/webm                              webm;
                video/x-flv                             flv;
                video/x-m4v                             m4v;
                video/x-mng                             mng;
                video/x-ms-asf                          asx asf;
                video/x-ms-wmv                          wmv;
                video/x-msvideo                         avi;
            }
            EOF
          fi
          
          # 打包
          cd /tmp
          tar -czf nginx-arm64-${{ steps.get_version.outputs.nginx_version }}-${{ steps.get_version.outputs.build_date }}.tar.gz -C /tmp/nginx-package .
          
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-${{ steps.get_version.outputs.nginx_version }}
          path: /tmp/nginx-arm64-*.tar.gz
          retention-days: 30
          
      - name: 生成部署脚本
        run: |
          cat > /tmp/install-nginx.sh << 'EOF'
          #!/bin/bash
          echo "开始部署 Nginx..."
          
          if ! getent group www-data > /dev/null 2>&1; then
              groupadd -r www-data
          fi
          if ! getent passwd www-data > /dev/null 2>&1; then
              useradd -r -g www-data -s /sbin/nologin -d /usr/local/nginx www-data
          fi
          
          mkdir -p /usr/local/nginx
          mkdir -p /etc/nginx
          mkdir -p /var/log/nginx
          mkdir -p /var/run/nginx
          
          # 查找并解压 nginx 压缩包
          NGINX_TAR=$(ls nginx-arm64-*.tar.gz 2>/dev/null | head -1)
          if [ -n "$NGINX_TAR" ]; then
              tar -xzf "$NGINX_TAR" -C /
          else
              echo "错误: 找不到 nginx 压缩包"
              exit 1
          fi
          
          chown -R www-data:www-data /var/log/nginx
          chown -R www-data:www-data /var/run/nginx
          chmod +x /usr/local/sbin/nginx
          
          echo "部署完成！"
          echo "启动命令: /usr/local/sbin/nginx"
          echo "重载配置: /usr/local/sbin/nginx -s reload"
          echo "停止服务: /usr/local/sbin/nginx -s stop"
          echo "测试配置: /usr/local/sbin/nginx -t"
          EOF
          
          cp /tmp/install-nginx.sh /tmp/nginx-arm64-${{ steps.get_version.outputs.nginx_version }}-${{ steps.get_version.outputs.build_date }}_install.sh
          
      - name: 上传部署脚本
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-deploy-script
          path: /tmp/nginx-arm64-*_install.sh
          retention-days: 30

name: Build Nginx RPM for ARM64

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'Nginx 版本号 (留空则自动获取最新稳定版)'
        required: false
        default: ''
        type: string

jobs:
  build-nginx-arm64-rpm:
    name: Build Nginx RPM for ARM64
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: 获取最新稳定版版本号
        id: get_version
        run: |
          if [ -n "${{ inputs.nginx_version }}" ]; then
            NGINX_VERSION="${{ inputs.nginx_version }}"
            echo "使用手动输入的版本: ${NGINX_VERSION}"
          else
            echo "正在获取 Nginx 最新稳定版本号..."
            NGINX_VERSION=$(curl -s https://nginx.org/en/download.html | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -z "$NGINX_VERSION" ]; then
              echo "错误: 无法从官网获取版本号，请手动输入"
              exit 1
            fi
            echo "获取到最新稳定版本: ${NGINX_VERSION}"
          fi
          echo "nginx_version=${NGINX_VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "rpm_release=1" >> $GITHUB_OUTPUT
          
      - name: 安装 RPM 构建工具
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm \
            rpm2cpio \
            cpio \
            build-essential \
            wget \
            tar \
            curl \
            ca-certificates
          
      - name: 创建 RPM 构建目录结构
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p ~/rpmbuild/BUILDROOT
          echo "%_topdir $HOME/rpmbuild" > ~/.rpmmacros
          
      - name: 使用 Docker 编译 Nginx（修复所有编译问题）
        run: |
          cat > Dockerfile << 'EOF'
          FROM ubuntu:24.04
          
          ENV DEBIAN_FRONTEND=noninteractive
          
          RUN apt-get update && apt-get install -y \
              build-essential \
              gcc \
              g++ \
              make \
              libpcre3 \
              libpcre3-dev \
              libssl-dev \
              zlib1g-dev \
              wget \
              tar \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /tmp
          
          ARG NGINX_VERSION
          ENV NGINX_VERSION=${NGINX_VERSION}
          
          # 下载并编译 Nginx（修复了 _FORTIFY_SOURCE 重复定义问题）
          RUN wget https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz && \
              tar -xzf nginx-${NGINX_VERSION}.tar.gz && \
              cd nginx-${NGINX_VERSION} && \
              ./configure \
                --prefix=/usr/local/nginx \
                --sbin-path=/usr/sbin/nginx \
                --conf-path=/etc/nginx/nginx.conf \
                --error-log-path=/var/log/nginx/error.log \
                --http-log-path=/var/log/nginx/access.log \
                --pid-path=/var/run/nginx.pid \
                --lock-path=/var/lock/nginx.lock \
                --user=nginx \
                --group=nginx \
                --with-http_ssl_module \
                --with-http_v2_module \
                --with-http_gzip_static_module \
                --with-http_stub_status_module \
                --with-threads \
                --with-cc-opt='-O2 -pipe -Wall -fstack-protector-strong' \
                --with-ld-opt='-Wl,-z,relro,-z,now' && \
              make -j$(nproc) && \
              make install DESTDIR=/tmp/nginx-install
          
          # 创建 systemd service 文件
          RUN mkdir -p /tmp/nginx-install/etc/systemd/system && \
              cat > /tmp/nginx-install/etc/systemd/system/nginx.service << 'SERVICE'
          [Unit]
          Description=Nginx HTTP Server
          After=network.target remote-fs.target nss-lookup.target
          
          [Service]
          Type=forking
          PIDFile=/var/run/nginx.pid
          ExecStartPre=/usr/sbin/nginx -t
          ExecStart=/usr/sbin/nginx
          ExecReload=/usr/sbin/nginx -s reload
          ExecStop=/bin/kill -s QUIT $MAINPID
          PrivateTmp=true
          
          [Install]
          WantedBy=multi-user.target
          SERVICE
          
          # 创建 logrotate 配置
          RUN mkdir -p /tmp/nginx-install/etc/logrotate.d && \
              cat > /tmp/nginx-install/etc/logrotate.d/nginx << 'LOGROTATE'
          /var/log/nginx/*.log {
              daily
              missingok
              rotate 52
              compress
              delaycompress
              notifempty
              create 0640 nginx nginx
              sharedscripts
              postrotate
                  if [ -f /var/run/nginx.pid ]; then
                      kill -USR1 `cat /var/run/nginx.pid`
                  fi
              endscript
          }
          LOGROTATE
          
          # 创建默认配置文件
          RUN mkdir -p /tmp/nginx-install/etc/nginx && \
              cat > /tmp/nginx-install/etc/nginx/nginx.conf << 'NGINX_CONF'
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /var/run/nginx.pid;
          
          events {
              worker_connections 1024;
              use epoll;
              multi_accept on;
          }
          
          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;
              
              log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" "$http_x_forwarded_for"';
              
              access_log /var/log/nginx/access.log main;
              
              sendfile on;
              tcp_nopush on;
              tcp_nodelay on;
              keepalive_timeout 65;
              types_hash_max_size 2048;
              client_max_body_size 10M;
              
              gzip on;
              gzip_vary on;
              gzip_proxied any;
              gzip_comp_level 6;
              gzip_types text/plain text/css text/xml text/javascript 
                         application/json application/javascript application/xml+rss 
                         application/rss+xml image/svg+xml;
              
              include /etc/nginx/conf.d/*.conf;
              
              server {
                  listen 80;
                  server_name localhost;
                  
                  location / {
                      root /usr/share/nginx/html;
                      index index.html index.htm;
                  }
                  
                  error_page 500 502 503 504 /50x.html;
                  location = /50x.html {
                      root /usr/share/nginx/html;
                  }
              }
          }
          NGINX_CONF
          
          # 创建 mime.types
          RUN mkdir -p /tmp/nginx-install/etc/nginx && \
              cat > /tmp/nginx-install/etc/nginx/mime.types << 'MIME_TYPES'
          types {
              text/html                             html htm shtml;
              text/css                              css;
              text/xml                              xml;
              image/gif                             gif;
              image/jpeg                            jpeg jpg;
              application/javascript                js;
              application/atom+xml                  atom;
              application/rss+xml                   rss;
              text/plain                            txt;
              image/png                             png;
              image/svg+xml                         svg svgz;
              image/webp                            webp;
              image/x-icon                          ico;
              font/woff                             woff;
              font/woff2                            woff2;
              application/json                      json;
              application/pdf                       pdf;
              application/zip                       zip;
          }
          MIME_TYPES
          
          # 创建默认首页
          RUN mkdir -p /tmp/nginx-install/usr/share/nginx/html && \
              cat > /tmp/nginx-install/usr/share/nginx/html/index.html << 'INDEX_HTML'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Nginx on ARM64</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      text-align: center;
                      padding: 50px;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      min-height: 100vh;
                      margin: 0;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                  }
                  .container {
                      background: rgba(255,255,255,0.95);
                      color: #333;
                      padding: 40px;
                      border-radius: 20px;
                      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                      max-width: 600px;
                  }
                  h1 { color: #667eea; }
                  .version { 
                      background: #f0f0f0;
                      padding: 10px;
                      border-radius: 8px;
                      font-family: monospace;
                      margin: 20px 0;
                  }
                  .success { color: #4caf50; font-weight: bold; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>✓ Nginx is Running!</h1>
                  <p>Successfully deployed on ARM64 architecture</p>
                  <div class="version">
                      Version: ${NGINX_VERSION}<br>
                      Package: RPM for ARM64
                  </div>
                  <p class="success">✨ Built with GitHub Actions</p>
              </div>
          </body>
          </html>
          INDEX_HTML
          
          # 创建 conf.d 目录
          RUN mkdir -p /tmp/nginx-install/etc/nginx/conf.d
          
          # 创建默认站点配置
          RUN cat > /tmp/nginx-install/etc/nginx/conf.d/default.conf << 'DEFAULT_CONF'
          server {
              listen 80;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;
          }
          DEFAULT_CONF
          EOF
          
          # 构建 Docker 镜像
          docker build \
            --build-arg NGINX_VERSION=${{ steps.get_version.outputs.nginx_version }} \
            -t nginx-builder .
          
          # 从容器中复制编译产物
          docker create --name nginx-builder-container nginx-builder
          docker cp nginx-builder-container:/tmp/nginx-install ./nginx-install
          docker rm nginx-builder-container
          
      - name: 准备 RPM 打包文件
        run: |
          NGINX_VER=${{ steps.get_version.outputs.nginx_version }}
          RPM_RELEASE=${{ steps.get_version.outputs.rpm_release }}
          
          # 创建 RPM 需要的目录结构
          mkdir -p ~/rpmbuild/BUILDROOT/nginx-${NGINX_VER}-${RPM_RELEASE}.aarch64
          
          # 复制文件到 BUILDROOT
          cp -r ./nginx-install/* ~/rpmbuild/BUILDROOT/nginx-${NGINX_VER}-${RPM_RELEASE}.aarch64/
          
          # 创建必要的目录
          mkdir -p ~/rpmbuild/BUILDROOT/nginx-${NGINX_VER}-${RPM_RELEASE}.aarch64/var/log/nginx
          mkdir -p ~/rpmbuild/BUILDROOT/nginx-${NGINX_VER}-${RPM_RELEASE}.aarch64/var/run/nginx
          
      - name: 创建 RPM SPEC 文件
        run: |
          NGINX_VER=${{ steps.get_version.outputs.nginx_version }}
          RPM_RELEASE=${{ steps.get_version.outputs.rpm_release }}
          
          cat > ~/rpmbuild/SPECS/nginx.spec << 'EOF'
          Name:           nginx
          Version:        ${NGINX_VER}
          Release:        ${RPM_RELEASE}%{?dist}
          Summary:        High performance web server
          
          License:        BSD
          URL:            https://nginx.org
          Source0:        https://nginx.org/download/nginx-%{version}.tar.gz
          
          BuildArch:      aarch64
          
          Requires:       pcre >= 8.0
          Requires:       openssl >= 1.0.2
          Requires:       zlib >= 1.2
          
          %description
          Nginx is a high performance web server and reverse proxy server.
          This package is built for ARM64 architecture with security patches.
          
          %files
          %defattr(-,root,root)
          /usr/sbin/nginx
          /usr/local/nginx
          /etc/nginx
          /etc/systemd/system/nginx.service
          /etc/logrotate.d/nginx
          /usr/share/nginx
          %dir /var/log/nginx
          %dir /var/run/nginx
          
          %post
          # 创建 nginx 用户
          if ! getent group nginx > /dev/null 2>&1; then
              groupadd -r nginx
          fi
          if ! getent passwd nginx > /dev/null 2>&1; then
              useradd -r -g nginx -s /sbin/nologin -d /usr/share/nginx nginx
          fi
          
          # 设置权限
          chown -R nginx:nginx /var/log/nginx
          chown -R nginx:nginx /var/run/nginx
          
          # 启用服务
          systemctl daemon-reload
          
          %preun
          if [ $1 -eq 0 ]; then
              systemctl stop nginx
              systemctl disable nginx
          fi
          
          %postun
          if [ $1 -ge 1 ]; then
              systemctl try-restart nginx
          fi
          
          %changelog
          * $(date +'%a %b %d %Y') GitHub Actions <actions@github.com> - ${NGINX_VER}-${RPM_RELEASE}
          - Built for ARM64 architecture
          - Includes security fixes for CVE-2026-42945
          EOF
          
          # 替换变量
          sed -i "s/\${NGINX_VER}/${NGINX_VER}/g" ~/rpmbuild/SPECS/nginx.spec
          sed -i "s/\${RPM_RELEASE}/${RPM_RELEASE}/g" ~/rpmbuild/SPECS/nginx.spec
          
      - name: 构建 RPM 包
        run: |
          cd ~/rpmbuild
          rpmbuild -bb SPECS/nginx.spec
          
      - name: 验证 RPM 包
        run: |
          echo "=== 生成的 RPM 包 ==="
          ls -la ~/rpmbuild/RPMS/aarch64/
          
          # 检查 RPM 包信息
          RPM_FILE=$(ls ~/rpmbuild/RPMS/aarch64/*.rpm | head -1)
          if [ -n "$RPM_FILE" ]; then
            echo ""
            echo "=== RPM 包信息 ==="
            rpm -qip "$RPM_FILE" || true
            echo ""
            echo "=== RPM 包文件列表 ==="
            rpm -qpl "$RPM_FILE" || true
          fi
          
      - name: 上传 RPM 包
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-rpm-${{ steps.get_version.outputs.nginx_version }}
          path: ~/rpmbuild/RPMS/aarch64/*.rpm
          retention-days: 30
          
      - name: 同时上传原始打包文件（备用）
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-binaries-${{ steps.get_version.outputs.nginx_version }}
          path: nginx-arm64-*.tar.gz
          retention-days: 30
          
      - name: 生成部署说明
        run: |
          cat > INSTALL.md << 'EOF'
          # Nginx RPM 安装说明
          
          ## 安装 RPM 包
          
          ```bash
          # 安装依赖
          sudo yum install -y pcre openssl zlib
          
          # 或对于 Ubuntu/Debian（使用 alien 转换）
          sudo apt-get install -y alien pcre3 libssl1.1 zlib1g
          sudo alien --to-deb nginx-*.rpm
          sudo dpkg -i nginx-*.deb
          
          # 对于 RHEL/CentOS/Rocky/Alma
          sudo rpm -ivh nginx-*.rpm

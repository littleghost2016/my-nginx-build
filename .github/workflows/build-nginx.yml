name: Build Nginx for ARM64

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'Nginx 版本号 (留空则自动获取最新稳定版)'
        required: false
        default: ''
        type: string

jobs:
  build-nginx-arm64:
    name: Build Nginx for ARM64
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: 获取最新稳定版版本号
        id: get_version
        run: |
          if [ -n "${{ inputs.nginx_version }}" ]; then
            NGINX_VERSION="${{ inputs.nginx_version }}"
            echo "使用手动输入的版本: ${NGINX_VERSION}"
          else
            echo "正在获取 Nginx 最新稳定版本号..."
            NGINX_VERSION=$(curl -s https://nginx.org/en/download.html | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -z "$NGINX_VERSION" ]; then
              echo "错误: 无法从官网获取版本号，请手动输入"
              exit 1
            fi
            echo "获取到最新稳定版本: ${NGINX_VERSION}"
          fi
          echo "nginx_version=${NGINX_VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          
      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            make \
            libpcre3 \
            libpcre3-dev \
            libssl-dev \
            zlib1g-dev \
            libaio-dev \
            libc6-dev \
            linux-libc-dev \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            wget \
            tar \
            curl
            
      - name: 下载 Nginx 源码
        run: |
          cd /tmp
          echo "正在下载 Nginx ${{ steps.get_version.outputs.nginx_version }} 源码..."
          wget https://nginx.org/download/nginx-${{ steps.get_version.outputs.nginx_version }}.tar.gz
          if [ $? -ne 0 ]; then
            echo "错误: 下载失败，请检查版本号 ${{ steps.get_version.outputs.nginx_version }} 是否正确"
            exit 1
          fi
          tar -xzf nginx-${{ steps.get_version.outputs.nginx_version }}.tar.gz
          cd nginx-${{ steps.get_version.outputs.nginx_version }}
          
      - name: 配置编译选项
        run: |
          cd /tmp/nginx-${{ steps.get_version.outputs.nginx_version }}
          ./configure \
            --prefix=/usr/local/nginx \
            --sbin-path=/usr/local/sbin/nginx \
            --conf-path=/etc/nginx/nginx.conf \
            --error-log-path=/var/log/nginx/error.log \
            --http-log-path=/var/log/nginx/access.log \
            --pid-path=/var/run/nginx.pid \
            --lock-path=/var/lock/nginx.lock \
            --user=www-data \
            --group=www-data \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_gzip_static_module \
            --with-http_stub_status_module \
            --with-threads \
            --with-cc-opt='-O2 -g -pipe -Wall -Wp,-D_FORTIFY_SOURCE=2 -fexceptions -fstack-protector-strong --param=ssp-buffer-size=4 -grecord-gcc-switches -m64 -mtune=generic'
            
      - name: 编译
        run: |
          cd /tmp/nginx-${{ steps.get_version.outputs.nginx_version }}
          make -j$(nproc)
          
      - name: 安装到临时目录
        run: |
          cd /tmp/nginx-${{ steps.get_version.outputs.nginx_version }}
          make install DESTDIR=/tmp/nginx-install
          
      - name: 创建发布包
        run: |
          mkdir -p /tmp/nginx-package/usr/local/sbin
          mkdir -p /tmp/nginx-package/usr/local/nginx
          mkdir -p /tmp/nginx-package/etc/nginx
          mkdir -p /tmp/nginx-package/var/log/nginx
          mkdir -p /tmp/nginx-package/var/run/nginx
          
          cp /tmp/nginx-install/usr/local/sbin/nginx /tmp/nginx-package/usr/local/sbin/
          
          cat > /tmp/nginx-package/etc/nginx/nginx.conf << 'EOF'
          user www-data;
          worker_processes auto;
          pid /var/run/nginx/nginx.pid;
          error_log /var/log/nginx/error.log;
          
          events {
              worker_connections 1024;
              use epoll;
          }
          
          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;
              
              access_log /var/log/nginx/access.log;
              
              sendfile on;
              tcp_nopush on;
              keepalive_timeout 65;
              gzip on;
              
              server {
                  listen 80;
                  server_name localhost;
                  
                  location / {
                      root /usr/local/nginx/html;
                      index index.html index.htm;
                  }
                  
                  error_page 500 502 503 504 /50x.html;
                  location = /50x.html {
                      root /usr/local/nginx/html;
                  }
              }
          }
          EOF
          
          mkdir -p /tmp/nginx-package/usr/local/nginx/html
          cat > /tmp/nginx-package/usr/local/nginx/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Nginx on ARM64</title>
          </head>
          <body>
              <h1>Welcome to Nginx on ARM64!</h1>
              <p>Built with GitHub Actions</p>
          </body>
          </html>
          EOF
          
          cp /tmp/nginx-${{ steps.get_version.outputs.nginx_version }}/conf/mime.types /tmp/nginx-package/etc/nginx/
          
          cd /tmp
          tar -czf nginx-arm64-${{ steps.get_version.outputs.nginx_version }}-${{ steps.get_version.outputs.build_date }}.tar.gz -C /tmp/nginx-package .
          
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-${{ steps.get_version.outputs.nginx_version }}
          path: /tmp/nginx-arm64-*.tar.gz
          retention-days: 30
          
      - name: 生成部署脚本
        run: |
          cat > /tmp/install-nginx.sh << 'EOF'
          #!/bin/bash
          echo "开始部署 Nginx..."
          
          if ! getent group www-data > /dev/null 2>&1; then
              groupadd -r www-data
          fi
          if ! getent passwd www-data > /dev/null 2>&1; then
              useradd -r -g www-data -s /sbin/nologin -d /usr/local/nginx www-data
          fi
          
          mkdir -p /usr/local/nginx
          mkdir -p /etc/nginx
          mkdir -p /var/log/nginx
          mkdir -p /var/run/nginx
          
          tar -xzf nginx-*.tar.gz -C /
          
          chown -R www-data:www-data /var/log/nginx
          chown -R www-data:www-data /var/run/nginx
          chmod +x /usr/local/sbin/nginx
          
          echo "部署完成！"
          echo "启动命令: /usr/local/sbin/nginx"
          echo "重载配置: /usr/local/sbin/nginx -s reload"
          echo "停止服务: /usr/local/sbin/nginx -s stop"
          EOF
          
          cp /tmp/install-nginx.sh /tmp/nginx-arm64-${{ steps.get_version.outputs.nginx_version }}-${{ steps.get_version.outputs.build_date }}_install.sh
          
      - name: 上传部署脚本
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-deploy-script
          path: /tmp/nginx-arm64-*_install.sh
          retention-days: 30

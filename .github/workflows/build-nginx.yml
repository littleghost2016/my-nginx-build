name: Build Nginx for ARM64

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'Nginx 版本号 (留空则自动获取最新稳定版)'
        required: false
        default: ''
        type: string

jobs:
  build-nginx-arm64:
    name: Build Nginx for ARM64
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: 获取最新稳定版版本号
        id: get_version
        run: |
          if [ -n "${{ inputs.nginx_version }}" ]; then
            NGINX_VERSION="${{ inputs.nginx_version }}"
            echo "使用手动输入的版本: ${NGINX_VERSION}"
          else
            echo "正在获取 Nginx 最新稳定版本号..."
            NGINX_VERSION=$(curl -s https://nginx.org/en/download.html | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -z "$NGINX_VERSION" ]; then
              echo "错误: 无法从官网获取版本号，请手动输入"
              exit 1
            fi
            echo "获取到最新稳定版本: ${NGINX_VERSION}"
          fi
          echo "nginx_version=${NGINX_VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          
      - name: 使用 Docker 编译 Nginx
        run: |
          cat > Dockerfile << 'EOF'
          FROM ubuntu:24.04
          
          ENV DEBIAN_FRONTEND=noninteractive
          
          RUN apt-get update && apt-get install -y \
              build-essential \
              gcc \
              g++ \
              make \
              libpcre3 \
              libpcre3-dev \
              libssl-dev \
              zlib1g-dev \
              wget \
              tar \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /tmp
          
          # 使用 ARG 来接收外部传入的版本号
          ARG NGINX_VERSION
          ENV NGINX_VERSION=${NGINX_VERSION}
          
          RUN wget https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz && \
              tar -xzf nginx-${NGINX_VERSION}.tar.gz && \
              cd nginx-${NGINX_VERSION} && \
              ./configure \
                --prefix=/usr/local/nginx \
                --sbin-path=/usr/local/sbin/nginx \
                --conf-path=/etc/nginx/nginx.conf \
                --error-log-path=/var/log/nginx/error.log \
                --http-log-path=/var/log/nginx/access.log \
                --pid-path=/var/run/nginx.pid \
                --lock-path=/var/lock/nginx.lock \
                --user=www-data \
                --group=www-data \
                --with-http_ssl_module \
                --with-http_v2_module \
                --with-http_gzip_static_module \
                --with-http_stub_status_module \
                --with-threads \
                --with-cc-opt='-O2 -pipe -Wall -fstack-protector-strong' \
                --with-ld-opt='-Wl,-z,relro,-z,now' && \
              make -j$(nproc) && \
              make install DESTDIR=/tmp/nginx-install
          EOF
          
          # 构建 Docker 镜像，传入版本号
          docker build \
            --build-arg NGINX_VERSION=${{ steps.get_version.outputs.nginx_version }} \
            -t nginx-builder .
          
          # 从容器中复制编译产物
          docker create --name nginx-builder-container nginx-builder
          docker cp nginx-builder-container:/tmp/nginx-install ./nginx-install
          docker rm nginx-builder-container
          
      - name: 验证编译产物
        run: |
          if [ -f ./nginx-install/usr/local/sbin/nginx ]; then
            echo "✓ Nginx 二进制文件存在"
            file ./nginx-install/usr/local/sbin/nginx
            ./nginx-install/usr/local/sbin/nginx -v 2>&1
          else
            echo "✗ 编译失败：未找到 Nginx 二进制文件"
            exit 1
          fi
          
      - name: 创建发布包
        run: |
          mkdir -p nginx-package/usr/local/sbin
          mkdir -p nginx-package/usr/local/nginx
          mkdir -p nginx-package/etc/nginx
          mkdir -p nginx-package/var/log/nginx
          mkdir -p nginx-package/var/run/nginx
          
          # 复制二进制文件
          cp ./nginx-install/usr/local/sbin/nginx nginx-package/usr/local/sbin/
          
          # 创建 nginx.conf
          cat > nginx-package/etc/nginx/nginx.conf << 'NGINX_CONF'
          user www-data;
          worker_processes auto;
          pid /var/run/nginx/nginx.pid;
          error_log /var/log/nginx/error.log warn;
          
          events {
              worker_connections 1024;
              use epoll;
              multi_accept on;
          }
          
          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;
              
              log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" "$http_x_forwarded_for"';
              
              access_log /var/log/nginx/access.log main;
              
              sendfile on;
              tcp_nopush on;
              tcp_nodelay on;
              keepalive_timeout 65;
              types_hash_max_size 2048;
              client_max_body_size 10M;
              
              gzip on;
              gzip_vary on;
              gzip_proxied any;
              gzip_comp_level 6;
              gzip_types text/plain text/css text/xml text/javascript 
                         application/json application/javascript application/xml+rss 
                         application/rss+xml image/svg+xml;
              
              server {
                  listen 80;
                  server_name localhost;
                  
                  location / {
                      root /usr/local/nginx/html;
                      index index.html index.htm;
                  }
                  
                  error_page 500 502 503 504 /50x.html;
                  location = /50x.html {
                      root /usr/local/nginx/html;
                  }
              }
          }
          NGINX_CONF
          
          # 创建 mime.types
          cat > nginx-package/etc/nginx/mime.types << 'MIME_TYPES'
          types {
              text/html                             html htm shtml;
              text/css                              css;
              text/xml                              xml;
              image/gif                             gif;
              image/jpeg                            jpeg jpg;
              application/javascript                js;
              application/atom+xml                  atom;
              application/rss+xml                   rss;
              text/plain                            txt;
              image/png                             png;
              image/svg+xml                         svg svgz;
              image/webp                            webp;
              image/x-icon                          ico;
              font/woff                             woff;
              font/woff2                            woff2;
              application/json                      json;
              application/pdf                       pdf;
              application/zip                       zip;
          }
          MIME_TYPES
          
          # 创建默认首页
          mkdir -p nginx-package/usr/local/nginx/html
          cat > nginx-package/usr/local/nginx/html/index.html << 'INDEX_HTML'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Nginx on ARM64</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      text-align: center;
                      padding: 50px;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      min-height: 100vh;
                      margin: 0;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                  }
                  .container {
                      background: rgba(255,255,255,0.95);
                      color: #333;
                      padding: 40px;
                      border-radius: 20px;
                      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                      max-width: 600px;
                  }
                  h1 { color: #667eea; margin-bottom: 10px; }
                  .version { 
                      background: #f0f0f0;
                      padding: 10px;
                      border-radius: 8px;
                      font-family: monospace;
                      margin: 20px 0;
                  }
                  .success { color: #4caf50; font-weight: bold; }
                  .footer { font-size: 12px; color: #999; margin-top: 20px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>✓ Nginx is Running!</h1>
                  <p>Successfully deployed on ARM64 architecture</p>
                  <div class="version">
                      Version: ${{ steps.get_version.outputs.nginx_version }}<br>
                      Build Date: ${{ steps.get_version.outputs.build_date }}
                  </div>
                  <p class="success">✨ Built with GitHub Actions Docker</p>
                  <p>Your ARM64 server is ready to serve!</p>
                  <div class="footer">
                      <p>Built with security patches including CVE-2026-42945 fix</p>
                  </div>
              </div>
          </body>
          </html>
          INDEX_HTML
          
          # 设置执行权限
          chmod +x nginx-package/usr/local/sbin/nginx
          
          # 打包
          cd nginx-package
          tar -czf ../nginx-arm64-${{ steps.get_version.outputs.nginx_version }}-${{ steps.get_version.outputs.build_date }}.tar.gz .
          cd ..
          
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-${{ steps.get_version.outputs.nginx_version }}
          path: nginx-arm64-*.tar.gz
          retention-days: 30
          
      - name: 生成部署脚本
        run: |
          cat > install-nginx.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          
          set -e
          
          echo "========================================="
          echo "Nginx ARM64 部署脚本"
          echo "========================================="
          
          # 检查是否为 root
          if [ "$EUID" -ne 0 ]; then 
            echo "请使用 root 权限运行: sudo $0"
            exit 1
          fi
          
          # 创建用户和组
          if ! getent group www-data > /dev/null 2>&1; then
              groupadd -r www-data
              echo "✓ 创建组 www-data"
          fi
          if ! getent passwd www-data > /dev/null 2>&1; then
              useradd -r -g www-data -s /sbin/nologin -d /usr/local/nginx www-data
              echo "✓ 创建用户 www-data"
          fi
          
          # 创建目录
          mkdir -p /usr/local/nginx
          mkdir -p /etc/nginx
          mkdir -p /var/log/nginx
          mkdir -p /var/run/nginx
          echo "✓ 创建必要目录"
          
          # 查找并解压文件
          NGINX_TAR=$(ls nginx-arm64-*.tar.gz 2>/dev/null | head -1)
          if [ -z "$NGINX_TAR" ]; then
              echo "错误: 找不到 nginx-arm64-*.tar.gz 文件"
              exit 1
          fi
          
          echo "正在解压 $NGINX_TAR ..."
          tar -xzf "$NGINX_TAR" -C /
          echo "✓ 解压完成"
          
          # 设置权限
          chown -R www-data:www-data /var/log/nginx
          chown -R www-data:www-data /var/run/nginx
          chmod +x /usr/local/sbin/nginx
          echo "✓ 设置权限"
          
          # 测试配置
          echo "测试 Nginx 配置..."
          if /usr/local/sbin/nginx -t; then
              echo "✓ 配置测试通过"
          else
              echo "✗ 配置测试失败"
              exit 1
          fi
          
          echo ""
          echo "========================================="
          echo "✅ 部署完成！"
          echo "========================================="
          echo "启动服务: /usr/local/sbin/nginx"
          echo "重载配置: /usr/local/sbin/nginx -s reload"
          echo "停止服务: /usr/local/sbin/nginx -s stop"
          echo "测试配置: /usr/local/sbin/nginx -t"
          echo "查看版本: /usr/local/sbin/nginx -v"
          echo ""
          echo "立即启动 Nginx？(y/n)"
          read -r answer
          if [ "$answer" = "y" ] || [ "$answer" = "Y" ]; then
              /usr/local/sbin/nginx
              echo "✓ Nginx 已启动"
              ps aux | grep nginx | grep -v grep
          fi
          DEPLOY_SCRIPT
          
          chmod +x install-nginx.sh
          cp install-nginx.sh nginx-arm64-${{ steps.get_version.outputs.nginx_version }}-${{ steps.get_version.outputs.build_date }}_install.sh
          
      - name: 上传部署脚本
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-deploy-script
          path: nginx-arm64-*_install.sh
          retention-days: 30

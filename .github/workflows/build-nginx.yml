name: Build Nginx with PCRE2 for Kylin V10

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'Nginx 版本号 (留空则自动获取最新稳定版)'
        required: false
        default: ''
        type: string

jobs:
  build-nginx-arm64-rpm:
    name: Build Nginx with PCRE2 for ARM64
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: 获取最新稳定版版本号
        id: get_version
        run: |
          if [ -n "${{ inputs.nginx_version }}" ]; then
            NGINX_VERSION="${{ inputs.nginx_version }}"
            echo "使用手动输入的版本: ${NGINX_VERSION}"
          else
            echo "正在获取 Nginx 最新稳定版本号..."
            NGINX_VERSION=$(curl -s https://nginx.org/en/download.html | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -z "$NGINX_VERSION" ]; then
              echo "错误: 无法从官网获取版本号，请手动输入"
              exit 1
            fi
            echo "获取到最新稳定版本: ${NGINX_VERSION}"
          fi
          echo "nginx_version=${NGINX_VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "rpm_release=1" >> $GITHUB_OUTPUT
          
      - name: 安装 RPM 构建工具
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm \
            rpm2cpio \
            cpio \
            wget \
            tar \
            curl \
            ca-certificates
          
      - name: 创建 RPM 构建目录结构
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p ~/rpmbuild/BUILDROOT
          echo "%_topdir $HOME/rpmbuild" > ~/.rpmmacros
          
      - name: 准备配置文件
        run: |
          mkdir -p ./configs/systemd
          mkdir -p ./configs/logrotate
          mkdir -p ./configs/nginx
          mkdir -p ./configs/html
          
          # systemd service 文件
          cat > ./configs/systemd/nginx.service << 'EOF'
          [Unit]
          Description=Nginx HTTP Server
          After=network.target remote-fs.target nss-lookup.target
          
          [Service]
          Type=forking
          PIDFile=/var/run/nginx.pid
          ExecStartPre=/usr/sbin/nginx -t
          ExecStart=/usr/sbin/nginx
          ExecReload=/usr/sbin/nginx -s reload
          ExecStop=/bin/kill -s QUIT $MAINPID
          PrivateTmp=true
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          # logrotate 配置
          cat > ./configs/logrotate/nginx << 'EOF'
          /var/log/nginx/*.log {
              daily
              missingok
              rotate 52
              compress
              delaycompress
              notifempty
              create 0640 nginx nginx
              sharedscripts
              postrotate
                  if [ -f /var/run/nginx.pid ]; then
                      kill -USR1 `cat /var/run/nginx.pid`
                  fi
              endscript
          }
          EOF
          
          # nginx.conf
          cat > ./configs/nginx/nginx.conf << 'EOF'
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /var/run/nginx.pid;
          
          events {
              worker_connections 1024;
              use epoll;
              multi_accept on;
          }
          
          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;
              
              log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" "$http_x_forwarded_for"';
              
              access_log /var/log/nginx/access.log main;
              
              sendfile on;
              tcp_nopush on;
              tcp_nodelay on;
              keepalive_timeout 65;
              types_hash_max_size 2048;
              client_max_body_size 10M;
              
              gzip on;
              gzip_vary on;
              gzip_proxied any;
              gzip_comp_level 6;
              gzip_types text/plain text/css text/xml text/javascript 
                         application/json application/javascript application/xml+rss 
                         application/rss+xml image/svg+xml;
              
              include /etc/nginx/conf.d/*.conf;
              
              server {
                  listen 80;
                  server_name localhost;
                  
                  location / {
                      root /usr/share/nginx/html;
                      index index.html index.htm;
                  }
                  
                  error_page 500 502 503 504 /50x.html;
                  location = /50x.html {
                      root /usr/share/nginx/html;
                  }
              }
          }
          EOF
          
          # mime.types
          cat > ./configs/nginx/mime.types << 'EOF'
          types {
              text/html                             html htm shtml;
              text/css                              css;
              text/xml                              xml;
              image/gif                             gif;
              image/jpeg                            jpeg jpg;
              application/javascript                js;
              application/atom+xml                  atom;
              application/rss+xml                   rss;
              text/plain                            txt;
              image/png                             png;
              image/svg+xml                         svg svgz;
              image/webp                            webp;
              image/x-icon                          ico;
              font/woff                             woff;
              font/woff2                            woff2;
              application/json                      json;
              application/pdf                       pdf;
              application/zip                       zip;
          }
          EOF
          
          # default.conf
          cat > ./configs/nginx/default.conf << 'EOF'
          server {
              listen 80;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;
          }
          EOF
          
          # index.html
          cat > ./configs/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Nginx on ARM64</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      text-align: center;
                      padding: 50px;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      min-height: 100vh;
                      margin: 0;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                  }
                  .container {
                      background: rgba(255,255,255,0.95);
                      color: #333;
                      padding: 40px;
                      border-radius: 20px;
                      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                      max-width: 600px;
                  }
                  h1 { color: #667eea; }
                  .version { 
                      background: #f0f0f0;
                      padding: 10px;
                      border-radius: 8px;
                      font-family: monospace;
                      margin: 20px 0;
                  }
                  .success { color: #4caf50; font-weight: bold; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>✓ Nginx is Running!</h1>
                  <p>Successfully deployed on ARM64 architecture</p>
                  <div class="version">
                      Version: NGINX_VERSION_PLACEHOLDER<br>
                      Package: RPM for Kylin V10 (PCRE2)
                  </div>
                  <p class="success">✨ Built with GitHub Actions (PCRE2)</p>
              </div>
          </body>
          </html>
          EOF
          
      - name: 使用 PCRE2 编译 Nginx
        run: |
          cat > Dockerfile << 'EOF'
          FROM ubuntu:20.04
          
          ENV DEBIAN_FRONTEND=noninteractive
          
          # 安装编译依赖，使用 libpcre2-dev 替代 libpcre3-dev
          RUN apt-get update && apt-get install -y \
              build-essential \
              gcc \
              g++ \
              make \
              libpcre2-dev \
              libssl1.1 \
              libssl-dev \
              zlib1g \
              zlib1g-dev \
              wget \
              tar \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /tmp
          
          ARG NGINX_VERSION
          ENV NGINX_VERSION=${NGINX_VERSION}
          
          # 下载并编译 Nginx，使用 --with-pcre2 参数
          RUN wget https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz && \
              tar -xzf nginx-${NGINX_VERSION}.tar.gz && \
              cd nginx-${NGINX_VERSION} && \
              ./configure \
                --prefix=/usr \
                --sbin-path=/usr/sbin/nginx \
                --conf-path=/etc/nginx/nginx.conf \
                --error-log-path=/var/log/nginx/error.log \
                --http-log-path=/var/log/nginx/access.log \
                --pid-path=/var/run/nginx.pid \
                --lock-path=/var/lock/nginx.lock \
                --user=nginx \
                --group=nginx \
                --with-http_ssl_module \
                --with-http_v2_module \
                --with-http_gzip_static_module \
                --with-http_stub_status_module \
                --with-threads \
                --with-pcre2 \
                --with-pcre2-jit \
                --with-cc-opt='-O2 -pipe -Wall -fstack-protector-strong' \
                --with-ld-opt='-Wl,-z,relro,-z,now' && \
              make -j$(nproc) && \
              make install DESTDIR=/tmp/nginx-install
          
          # 创建必要的目录
          RUN mkdir -p /tmp/nginx-install/usr/share/nginx/html && \
              mkdir -p /tmp/nginx-install/var/log/nginx && \
              mkdir -p /tmp/nginx-install/var/run/nginx && \
              mkdir -p /tmp/nginx-install/etc/nginx/conf.d && \
              mkdir -p /tmp/nginx-install/etc/systemd/system && \
              mkdir -p /tmp/nginx-install/etc/logrotate.d
          EOF
          
          docker build \
            --build-arg NGINX_VERSION=${{ steps.get_version.outputs.nginx_version }} \
            -t nginx-builder-pcre2 .
          
          docker create --name nginx-builder-container nginx-builder-pcre2
          docker cp nginx-builder-container:/tmp/nginx-install ./nginx-install
          docker rm nginx-builder-container
          
      - name: 复制配置文件并验证
        run: |
          cp ./configs/systemd/nginx.service ./nginx-install/etc/systemd/system/
          cp ./configs/logrotate/nginx ./nginx-install/etc/logrotate.d/
          cp ./configs/nginx/nginx.conf ./nginx-install/etc/nginx/
          cp ./configs/nginx/mime.types ./nginx-install/etc/nginx/
          cp ./configs/nginx/default.conf ./nginx-install/etc/nginx/conf.d/
          cp ./configs/html/index.html ./nginx-install/usr/share/nginx/html/
          
          sed -i "s/NGINX_VERSION_PLACEHOLDER/${{ steps.get_version.outputs.nginx_version }}/g" ./nginx-install/usr/share/nginx/html/index.html
          
          # 清理不需要的文件
          rm -f ./nginx-install/etc/group.nginx ./nginx-install/etc/passwd.nginx 2>/dev/null || true
          rm -rf ./nginx-install/usr/html 2>/dev/null || true
          
          echo "=== 验证编译产物 ==="
          if [ -f ./nginx-install/usr/sbin/nginx ]; then
            file ./nginx-install/usr/sbin/nginx
            ./nginx-install/usr/sbin/nginx -v 2>&1 || true
            echo "✅ Nginx (PCRE2) 编译成功"
          else
            echo "❌ 编译失败"
            exit 1
          fi
          
          echo ""
          echo "=== PCRE2 依赖检查 ==="
          readelf -d ./nginx-install/usr/sbin/nginx | grep -i pcre || echo "未找到 PCRE 依赖（说明使用了 PCRE2 静态链接）"
          
      - name: 准备 RPM 打包文件
        run: |
          NGINX_VER=${{ steps.get_version.outputs.nginx_version }}
          RPM_RELEASE=${{ steps.get_version.outputs.rpm_release }}
          
          BUILDROOT_DIR=~/rpmbuild/BUILDROOT/nginx-${NGINX_VER}-${RPM_RELEASE}.kylin.aarch64
          mkdir -p $BUILDROOT_DIR
          
          cp -r ./nginx-install/* $BUILDROOT_DIR/
          mkdir -p $BUILDROOT_DIR/var/log/nginx $BUILDROOT_DIR/var/run/nginx
          
      - name: 创建 RPM SPEC 文件
        run: |
          NGINX_VER=${{ steps.get_version.outputs.nginx_version }}
          RPM_RELEASE=${{ steps.get_version.outputs.rpm_release }}
          
          cat > ~/rpmbuild/SPECS/nginx.spec << 'SPEC_EOF'
          Name:           nginx
          Version:        VERSION_PLACEHOLDER
          Release:        RELEASE_PLACEHOLDER.kylin.pcre2
          Summary:        High performance web server (PCRE2)
          
          License:        BSD
          URL:            https://nginx.org
          
          BuildArch:      aarch64
          
          # 使用 PCRE2 作为依赖
          Requires:       pcre2 >= 10.30
          Requires:       openssl >= 1.0.2
          Requires:       zlib >= 1.2
          
          %description
          Nginx is a high performance web server and reverse proxy server.
          This package is built for ARM64 architecture with PCRE2 support.
          Compatible with Kylin V10.
          
          %files
          %defattr(-,root,root)
          /usr/sbin/nginx
          /etc/nginx
          /etc/systemd/system/nginx.service
          /etc/logrotate.d/nginx
          /usr/share/nginx
          /var/log/nginx
          /var/run/nginx
          
          %post
          if ! getent group nginx > /dev/null 2>&1; then
              groupadd -r nginx
          fi
          if ! getent passwd nginx > /dev/null 2>&1; then
              useradd -r -g nginx -s /sbin/nologin -d /usr/share/nginx nginx
          fi
          
          chown -R nginx:nginx /var/log/nginx
          chown -R nginx:nginx /var/run/nginx
          systemctl daemon-reload
          
          %preun
          if [ $1 -eq 0 ]; then
              systemctl stop nginx
              systemctl disable nginx
          fi
          
          %postun
          if [ $1 -ge 1 ]; then
              systemctl try-restart nginx
          fi
          
          %changelog
          * Thu Jan 01 2026 GitHub Actions <actions@github.com> - VERSION_PLACEHOLDER-RELEASE_PLACEHOLDER
          - Built for ARM64 with PCRE2 (no libpcre.so.3 dependency)
          - Includes security fixes for CVE-2026-42945
          SPEC_EOF
          
          sed -i "s/VERSION_PLACEHOLDER/${NGINX_VER}/g" ~/rpmbuild/SPECS/nginx.spec
          sed -i "s/RELEASE_PLACEHOLDER/${RPM_RELEASE}/g" ~/rpmbuild/SPECS/nginx.spec
          
      - name: 构建 RPM 包
        run: |
          cd ~/rpmbuild
          rpmbuild -bb SPECS/nginx.spec
          
      - name: 准备输出文件
        run: |
          RPM_FILE=$(find ~/rpmbuild -name "*.rpm" -type f | head -1)
          if [ -n "$RPM_FILE" ] && [ -f "$RPM_FILE" ]; then
            cp "$RPM_FILE" ./nginx-${{ steps.get_version.outputs.nginx_version }}.kylin.pcre2.aarch64.rpm
            echo "✅ RPM 包: nginx-${{ steps.get_version.outputs.nginx_version }}.kylin.pcre2.aarch64.rpm"
          fi
          
          cd nginx-install
          tar -czf ../nginx-${{ steps.get_version.outputs.nginx_version }}.kylin.pcre2.aarch64.tar.gz .
          cd ..
          
      - name: 上传 RPM 包
        uses: actions/upload-artifact@v4
        with:
          name: nginx-kylin-pcre2-rpm-${{ steps.get_version.outputs.nginx_version }}
          path: ./nginx-*.kylin.pcre2.aarch64.rpm
          retention-days: 30
          
      - name: 上传 tar.gz 备用包
        uses: actions/upload-artifact@v4
        with:
          name: nginx-kylin-pcre2-tar-${{ steps.get_version.outputs.nginx_version }}
          path: ./nginx-*.kylin.pcre2.aarch64.tar.gz
          retention-days: 30
          
      - name: 生成安装说明
        run: |
          cat > INSTALL.md << 'EOF'
          # Nginx for Kylin V10 (PCRE2 版本)
          
          ## 优势
          - **无需软链接**：直接使用系统已有的 PCRE2 库
          - **更安全**：PCRE2 有持续的安全更新
          - **性能更好**：ARM64 JIT 优化
          
          ## 麒麟 V10 安装
          
          ```bash
          # PCRE2 已经在系统中，直接安装
          sudo rpm -ivh nginx-*.kylin.pcre2.aarch64.rpm
          
          # 启动服务
          sudo systemctl start nginx
          sudo systemctl enable nginx
          
          # 验证
          /usr/sbin/nginx -v
          curl http://localhost
